version: "2"
run:
  timeout: 10m
  tests: true
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
linters:
  default: none
  enable:
    - bodyclose
    - depguard
    - errcheck
    - errorlint
    - govet
    - ineffassign
    - misspell
    - nilerr
    - noctx
    - staticcheck
    - unconvert
    # Followups (own PR each — too many existing findings to land here):
    #   - contextcheck (26 findings: ctx threading)
    #   - gocritic (40 findings: mostly diagnostic-tag style nits)
  settings:
    errcheck:
      exclude-functions:
        - (io.Closer).Close
    govet:
      enable:
        - shadow
    depguard:
      rules:
        wails_import_boundary:
          list-mode: lax
          files:
            - $all
            - "!**/desktop/oswails/*.go"
            - "!**/desktop/oswails/**/*.go"
          deny:
            # Wails imports are confined to desktop/oswails; app data stays on
            # loopback HTTP/SSE/WebSocket through internal/team/broker_web_proxy.go.
            - pkg: github.com/wailsapp/wails/v2
              desc: Wails imports are only allowed in desktop/oswails.
            - pkg: github.com/wailsapp/wails/v3
              desc: Wails imports are only allowed in desktop/oswails.
    staticcheck:
      # Disable the QF* quickfix suggestions (pure style hints) and the
      # ST1000/ST1003/ST1021 naming/comment rules (pedantic, massive scope).
      # ST1005 (capitalized error strings) stays enabled — those are real.
      checks:
        - all
        - -QF1001
        - -QF1002
        - -QF1003
        - -QF1012
        - -ST1000
        - -ST1003
        - -ST1021
  exclusions:
    generated: lax
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - bodyclose
          - errorlint
          - noctx
      # govet's shadow check on `err` is famously noisy in idiomatic Go
      # (every nested `if err := ...; err != nil` shadows). Keep shadow on
      # for non-err identifiers (real bugs hide there) but mute the err case.
      - linters:
          - govet
        text: 'shadow: declaration of "err"'
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/nex-crm/wuphf
