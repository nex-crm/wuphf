name: CI

on:
  push:
    branches: [main]
  # Fire on every PR regardless of base branch. Without this, stacked
  # PRs (whose base is another open PR's branch, not main) get only
  # commitlint + scan + CodeRabbit — the full Go test job, web/web-e2e,
  # and release-build are skipped, so a typo or break can land
  # unnoticed and only surface when the stack tip retargets to main.
  # See the Track A/B refactor train (#289 → #297 → #298 → #299) for
  # the failure mode this filter caused.
  pull_request:

# Tighten the org default (`default_workflow_permissions: write`) — every
# job in CI is read-only against the repo. The matrix legs that need to
# upload-artifact / download-artifact rely on actions/upload-artifact's
# self-managed temporary token and don't need write contents.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      # Pin to full SHA: third-party action, runs on pull_request from forks
      # and can read any GITHUB_TOKEN the workflow exposes. A @v2 re-tag
      # would execute with CI privileges. Same SHA is reused in the web-e2e
      # job below — keep them in sync.
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # ratchet:oven-sh/setup-bun@v2.2.0
        with:
          bun-version: "1.1.38"
      - name: Install and build
        working-directory: web
        run: |
          bun install --frozen-lockfile
          bun run typecheck
          bun run build
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # ratchet:actions/upload-artifact@v7
        with:
          name: web-dist
          path: web/dist
          retention-days: 1

  lint:
    runs-on: ubuntu-latest
    # Single source of truth for govulncheck binary location. `go install`
    # writes to $GOBIN if set (else $GOPATH/bin), so pinning GOBIN here
    # keeps the cache path, install destination, and PATH lookup below
    # locked to one literal — eliminates the silent-cache-miss class of
    # bug if a future setup-go release shifts the default GOPATH.
    env:
      GOBIN: ${{ github.workspace }}/.gobin
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # ratchet:actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Check gofmt
        # Belt-and-braces net against the golangci-lint `gofmt` formatter (see
        # .golangci.yml). `-s` matches that linter's simplify=true default so
        # the two agree on "formatted". The empty-file guard keeps `gofmt -l`
        # from reading stdin and hanging on a sparse checkout.
        run: |
          files=$(git ls-files '*.go')
          if [ -z "$files" ]; then
            exit 0
          fi
          unformatted=$(gofmt -s -l $files)
          if [ -n "$unformatted" ]; then
            echo "gofmt reports the following files need formatting:"
            echo "$unformatted"
            echo
            echo "Run: gofmt -s -w \$(git ls-files '*.go')"
            exit 1
          fi
      # Pin to full SHA: third-party action, runs on pull_request from forks
      # and can read any GITHUB_TOKEN the workflow exposes. A @v9 re-tag
      # would execute with CI privileges.
      - uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # ratchet:golangci/golangci-lint-action@v9.2.0
        with:
          version: v2.11.4
          args: --timeout=5m
      - name: Cache govulncheck binary
        # The version below is pinned, so the compiled binary at
        # $GOBIN/govulncheck is reusable across every CI run that doesn't
        # bump the govulncheck version. Saves ~10-15s of `go install`
        # (download + compile) per run on warm cache.
        id: cache-govulncheck
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # ratchet:actions/cache@v5.0.5
        with:
          path: ${{ env.GOBIN }}/govulncheck
          key: govulncheck-${{ runner.os }}-v1.1.4
      - name: Install govulncheck
        if: steps.cache-govulncheck.outputs.cache-hit != 'true'
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
      - name: Run govulncheck
        # Catches reachable CVEs in the Go stdlib + modules. Flags us when we
        # fall behind on a Go minor bump without having to wait for a CVE
        # advisory to make noise. Pinned to an explicit version so a new
        # govulncheck release cannot flip pass/fail on the same commit.
        run: |
          export PATH="${{ env.GOBIN }}:$PATH"
          govulncheck ./...
      - name: Reject /tmp/ hardcodes in production Go
        # Windows guard: /tmp doesn't exist there, so anything bound to a
        # literal /tmp path silently writes to C:\tmp at the drive root (or
        # fails outright). Production code must use os.TempDir() — see the
        # runtime-aware helpers in internal/brokeraddr/addr.go for the
        # pattern. _test.go files are exempt (testdata fixtures often live
        # at known paths).
        run: |
          set -euo pipefail
          # The grep below excludes test files via :(exclude). The remaining
          # `internal/brokeraddr/addr.go` hits are the runtime-gated /tmp
          # branches that are only taken on non-Windows; those are correct.
          bad=$(git grep -nE '"/tmp/' -- '*.go' \
                 ':(exclude)*_test.go' \
                 ':(exclude)internal/brokeraddr/addr.go' || true)
          if [ -n "$bad" ]; then
            echo "$bad" >&2
            echo "" >&2
            echo "Found /tmp hardcodes in production Go. Use os.TempDir()." >&2
            echo "See internal/brokeraddr/addr.go for the runtime.GOOS pattern." >&2
            exit 1
          fi
      - name: Reject unix-only exec.Command shapes outside tmux/tui paths
        # Windows guard: bash/sh/chmod/ln/mkfifo/killall don't exist there.
        # Code that needs them must be in a _unix.go file with a build tag,
        # or guarded with runtime.GOOS at the call site. tmux is allowed
        # because UsesTmuxRuntime() gates it; if you're calling tmux from a
        # web-mode path, the regression is real and this should fail.
        #
        # Uses ripgrep with -U (multiline) + -P (PCRE) so call shapes split
        # across lines — exec.Command(\n    "bash",\n    "-c", ...) — are
        # caught. A previous line-oriented grep missed those. ripgrep is
        # preinstalled on ubuntu-latest.
        run: |
          set -euo pipefail
          bad=$(rg -nUP \
                  --type-add='go:*.go' --type=go \
                  --glob='!*_test.go' \
                  'exec\.(Command|LookPath|CommandContext)\(\s*"(bash|sh|chmod|ln|mkfifo|killall)"' \
                  internal/ cmd/ || true)
          # Allow _unix.go / _darwin.go / _linux.go files (compiled only on
          # those platforms by Go's build constraints).
          bad=$(echo "$bad" | grep -vE '_(unix|linux|darwin)\.go:' || true)
          if [ -n "$bad" ]; then
            echo "$bad" >&2
            echo "" >&2
            echo "Found unix-only exec.Command in cross-platform Go. Either:" >&2
            echo "  1. Move the code into a _unix.go file with //go:build !windows, or" >&2
            echo "  2. Guard the call site with runtime.GOOS." >&2
            exit 1
          fi

  # Single test job. We previously fanned out one matrix leg per Go package
  # (28 legs at peak) for nicer per-package red x's, but each leg paid
  # ~12-15s of checkout + setup-go + download-artifact overhead for ~20-50s
  # of actual test work — ~14 runner-minutes per CI run on overhead alone.
  # `go test ./...` runs packages in parallel within one process up to
  # GOMAXPROCS, so wall clock is bounded by the long-pole package
  # (`internal/team`, ~2.5m with -race) regardless of fan-out. Collapsing
  # gives ~80% compute reduction at no wall-clock cost. teammcp opts out
  # of -race until its test-isolation cleanup lands; everything else gets
  # the race detector. -timeout 15m is generous headroom over the ~3m
  # observed locally (race instrumentation 2-3x's wall-clock).
  go-test:
    needs: web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # ratchet:actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # ratchet:actions/download-artifact@v8
        with:
          name: web-dist
          path: web/dist
      # `set -euo pipefail` + the empty-package guard close a fail-open
      # path: bash does NOT propagate failures inside `$(...)`, so a
      # transient `go list` error or a regex tweak that drops every match
      # would otherwise degrade the step to `go test -race -timeout 15m`
      # against the cwd package only — green CI, every subpackage silently
      # skipped. `pipefail` surfaces the inner failure; the guard catches
      # an empty match list.
      #
      # On failure: the matrix used to give one red x per failing package
      # in the PR checks list; collapsed, both invocations swallow per-
      # package status into a single red x. `tee` to a log file + a
      # `grep '^FAIL'` summary at the end of the step reclaims the per-
      # package signal in the step's own log without bringing back the
      # matrix overhead. Logs are uploaded as an artifact on failure for
      # offline triage.
      - name: Tests with race detector (everything except teammcp)
        run: |
          set -euo pipefail
          pkgs=$(go list ./... | grep -vE '/internal/teammcp($|/)')
          if [ -z "$pkgs" ]; then
            echo "no packages matched — refusing to run an empty go test suite" >&2
            exit 1
          fi
          set +e
          go test -race -timeout 15m $pkgs 2>&1 | tee go-test-race.log
          status=${PIPESTATUS[0]}
          set -e
          if [ "$status" -ne 0 ]; then
            echo "::group::Failing packages (race suite)"
            grep -E '^(FAIL|--- FAIL)' go-test-race.log || echo "(no FAIL lines parsed; see full log above)"
            echo "::endgroup::"
            exit "$status"
          fi
      - name: Tests without race (internal/teammcp)
        run: |
          set -euo pipefail
          pkgs=$(go list ./... | grep -E '/internal/teammcp($|/)')
          if [ -z "$pkgs" ]; then
            echo "no packages matched — refusing to run an empty go test suite" >&2
            exit 1
          fi
          set +e
          go test -timeout 15m $pkgs 2>&1 | tee go-test-teammcp.log
          status=${PIPESTATUS[0]}
          set -e
          if [ "$status" -ne 0 ]; then
            echo "::group::Failing packages (teammcp suite)"
            grep -E '^(FAIL|--- FAIL)' go-test-teammcp.log || echo "(no FAIL lines parsed; see full log above)"
            echo "::endgroup::"
            exit "$status"
          fi
      - name: Upload go test logs on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # ratchet:actions/upload-artifact@v7
        with:
          name: go-test-logs
          path: |
            go-test-race.log
            go-test-teammcp.log
          retention-days: 7
          if-no-files-found: ignore

  # Cross-platform compile gate. Catches the class of regression where a
  # `golang.org/x/sys/unix` import or a stray `//go:build !windows` constraint
  # slips into the main path and breaks Windows/macOS without anyone noticing
  # until release time. `release-build` exists but only verifies what
  # goreleaser's `goos:` happens to enumerate; if a future PR drops `windows`
  # from .goreleaser.yml, this is the gate that catches it independently.
  go-cross-build:
    needs: web
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - {goos: windows, goarch: amd64}
          - {goos: windows, goarch: arm64}
          - {goos: darwin, goarch: arm64}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # ratchet:actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # ratchet:actions/download-artifact@v8
        with:
          name: web-dist
          path: web/dist
      - name: Cross-compile ${{ matrix.goos }}/${{ matrix.goarch }}
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        # `./...` (not just ./cmd/wuphf) so an internal/ package picking up a
        # unix-only import blocks the merge before someone hits it on Windows.
        run: go build ./...

  # Keep a standalone vet job so config drift (a new vet check landing in
  # a Go minor bump, or an unknown //go:build tag) surfaces with its own
  # red x instead of being mixed into a test leg. golangci-lint runs vet
  # too but only what its govet linter enables.
  vet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # ratchet:actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Vet
        run: go vet ./...

  build:
    needs: web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # ratchet:actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # ratchet:actions/download-artifact@v8
        with:
          name: web-dist
          path: web/dist
      - run: go build -o wuphf ./cmd/wuphf
      - name: Smoke test binary
        run: |
          ./wuphf --version
          ./wuphf --help-all > /dev/null

  vhs:
    runs-on: ubuntu-latest
    env:
      VHS_VERSION: "v0.11.0"
      TTYD_VERSION: "1.7.7"
      TTYD_SHA256: "8a217c968aba172e0dbf3f34447218dc015bc4d5e59bf51db2f2cd12b7be4f55"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # ratchet:actions/setup-go@v6
        with:
          # VHS tracks newer Go minors than go.mod pins; use stable so
          # `go install vhs` isn't blocked by GOTOOLCHAIN=local (Go is
          # forward-compatible for the wuphf build in this job).
          go-version: stable
      - name: Cache VHS binary
        id: cache-vhs
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # ratchet:actions/cache@v5.0.5
        with:
          path: ~/go/bin/vhs
          key: vhs-${{ runner.os }}-${{ env.VHS_VERSION }}
      - name: Install VHS
        if: steps.cache-vhs.outputs.cache-hit != 'true'
        run: go install github.com/charmbracelet/vhs@${{ env.VHS_VERSION }}
      - name: Cache ttyd download
        id: cache-ttyd
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # ratchet:actions/cache@v5.0.5
        with:
          path: /tmp/ttyd.x86_64
          key: ttyd-${{ runner.os }}-${{ env.TTYD_VERSION }}-${{ env.TTYD_SHA256 }}
      - name: Download ttyd
        if: steps.cache-ttyd.outputs.cache-hit != 'true'
        run: curl -fLo /tmp/ttyd.x86_64 https://github.com/tsl0922/ttyd/releases/download/${{ env.TTYD_VERSION }}/ttyd.x86_64
      - name: Verify ttyd integrity
        # Verify both on cache-miss (just downloaded) and cache-hit (guard
        # against restored corruption or a ttyd release re-tag).
        run: echo "${{ env.TTYD_SHA256 }}  /tmp/ttyd.x86_64" | sha256sum -c -
      - name: Install ttyd
        run: sudo install /tmp/ttyd.x86_64 /usr/local/bin/ttyd
      - name: Install ffmpeg
        # Pin to full SHA: third-party action runs `sudo apt-get`, so a re-tag
        # of @v1 would execute with elevated privileges on the runner.
        uses: awalsh128/cache-apt-pkgs-action@acb598e5ddbc6f68a970c5da0688d2f3a9f04d05 # ratchet:awalsh128/cache-apt-pkgs-action@v1.6.0
        with:
          # libblas3 is a transitive runtime dep of ffmpeg on ubuntu-latest.
          # Listing it explicitly guarantees it lands in the apt cache payload
          # alongside ffmpeg, so warm restores do not surface
          # `ffmpeg: error while loading shared libraries: libblas.so.3`.
          packages: ffmpeg libblas3
          # NOTE: `version` is a cache-bust token, NOT an ffmpeg version pin.
          # Bump it to force a fresh apt-get install (e.g., for a security
          # advisory, or when the dependency list above changes). `packages`
          # has no version constraint, so warm runs reuse whatever .debs the
          # cold run captured.
          version: "2"
      - name: Build wuphf
        run: go build -o wuphf ./cmd/wuphf
      - name: Run VHS regression checks
        run: |
          export PATH="$PWD:$PATH"
          bash testdata/vhs/check.sh
      - name: Upload drift artifacts on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # ratchet:actions/upload-artifact@v7
        with:
          name: vhs-drift
          path: testdata/vhs/*.actual
          retention-days: 7

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - name: Run shellcheck
        run: |
          sudo apt-get install -y shellcheck
          shellcheck scripts/*.sh testdata/vhs/*.sh

  web-e2e:
    # Playwright smoke against the real web UI. Guards the class of regression
    # we kept shipping (React render crashes that only surface in a browser
    # — e.g. "No QueryClient set", Minified React error #31 on first agent
    # click) by booting wuphf, loading /, and walking the happy path.
    needs: web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # ratchet:actions/setup-go@v6
        with:
          go-version-file: go.mod
      # Pin to full SHA: third-party action, runs on every PR. A @v2 re-tag
      # would exec with CI privileges — see the awalsh128 pin above for the
      # same pattern.
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # ratchet:oven-sh/setup-bun@v2.2.0
        with:
          bun-version: "1.1.38"
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # ratchet:actions/download-artifact@v8
        with:
          name: web-dist
          path: web/dist
      - name: Build wuphf
        run: go build -o wuphf ./cmd/wuphf
      - name: Install e2e deps
        working-directory: web/e2e
        run: bun install --frozen-lockfile
      - name: Cache Playwright browsers
        id: cache-playwright
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # ratchet:actions/cache@v5.0.5
        with:
          path: ~/.cache/ms-playwright
          # Key on the resolved @playwright/test version via bun.lock so a
          # bump invalidates.
          key: playwright-${{ runner.os }}-${{ hashFiles('web/e2e/bun.lock') }}
      - name: Install Playwright chromium
        working-directory: web/e2e
        # --with-deps installs the OS-level shared libs chromium needs on
        # ubuntu-latest even when the cached browser binary is restored.
        run: bunx playwright install --with-deps chromium
      - name: Install claude CLI stub
        # wuphf's PreflightWeb hard-requires `claude` on PATH (see
        # internal/team/launcher.go — PreflightWeb). These smoke tests don't
        # send messages to agents, so a no-op stub that LookPath can find is
        # enough to get past preflight and boot the web UI.
        run: |
          sudo tee /usr/local/bin/claude >/dev/null <<'SH'
          #!/bin/sh
          # Smoke-test stub. Present only to satisfy exec.LookPath("claude").
          echo "stub claude $*" >&2
          exit 0
          SH
          sudo chmod +x /usr/local/bin/claude
      # The suite splits into two phases because App.tsx routes on
      # onboardingComplete: fresh install → <Wizard>, seeded → <Shell>. One
      # wuphf instance can only be in one state, so we boot twice.
      #
      # Phase 1: fresh install (wizard.spec.ts). No onboarded.json.
      # Phase 2: seeded      (shell suite — smoke, chat, slash-commands, dm,
      #                       mentions, interview). Write onboarded.json first.
      # `</dev/null` on both boots prevents isPiped() from yanking wuphf into
      # scanner mode.
      - name: Start wuphf (fresh install) for wizard tests
        # Run from /tmp — NOT the checkout root. `resolveTemplatesRepoRoot`
        # walks up from cwd looking for templates/operations/, and would
        # find it in the checkout, masking the "no repo on disk" path that
        # `npx wuphf` / `curl | bash` users actually take. Running from
        # /tmp forces the blueprint loader to go through the embedded FS
        # wired in templates_embed.go, which is exactly the regression
        # path the wizard.spec.ts blueprint-picker test guards.
        run: |
          rm -f "$HOME/.wuphf/onboarded.json"
          wuphf_bin="$PWD/wuphf"
          run_dir="$(mktemp -d)"
          cd "$run_dir"
          "$wuphf_bin" --no-open --broker-port 7890 --web-port 7891 --no-nex </dev/null > "$GITHUB_WORKSPACE/wuphf-wizard.log" 2>&1 &
          echo $! > "$GITHUB_WORKSPACE/wuphf-wizard.pid"
          # /onboarding/state is the authoritative readiness signal (the
          # static index.html can 200 before the broker is fully wired).
          for i in $(seq 1 30); do
            if curl -sf http://localhost:7891/onboarding/state -o /dev/null; then
              echo "wuphf ready (wizard) after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "wuphf failed to become ready (wizard)" >&2
          cat "$GITHUB_WORKSPACE/wuphf-wizard.log" >&2
          exit 1
      - name: Run Playwright wizard smoke
        working-directory: web/e2e
        env:
          WUPHF_E2E_BASE_URL: http://localhost:7891
        run: bunx playwright test tests/wizard.spec.ts
      - name: Stop wuphf (wizard phase)
        if: always()
        run: |
          if [ -f wuphf-wizard.pid ]; then
            kill "$(cat wuphf-wizard.pid)" 2>/dev/null || true
          fi
          # Wait for port 7891 to free up before Phase 2 tries to bind it.
          for _ in $(seq 1 10); do
            if ! (exec 3<>/dev/tcp/127.0.0.1/7891) 2>/dev/null; then break; fi
            sleep 1
          done
      - name: Seed onboarding state + start wuphf for shell tests
        run: |
          mkdir -p "$HOME/.wuphf"
          cat > "$HOME/.wuphf/onboarded.json" <<'JSON'
          {"version":1,"completed_at":"2026-01-01T00:00:00Z","company_name":"e2e-ci"}
          JSON
          ./wuphf --no-open --broker-port 7890 --web-port 7891 --no-nex </dev/null > wuphf.log 2>&1 &
          echo $! > wuphf.pid
          for i in $(seq 1 30); do
            if curl -sf http://localhost:7891/onboarding/state -o /dev/null; then
              echo "wuphf ready (shell) after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "wuphf failed to become ready (shell)" >&2
          cat wuphf.log >&2
          exit 1
      - name: Run Playwright shell suite
        working-directory: web/e2e
        env:
          WUPHF_E2E_BASE_URL: http://localhost:7891
        run: |
          bunx playwright test \
            tests/smoke.spec.ts \
            tests/chat.spec.ts \
            tests/slash-commands.spec.ts \
            tests/dm.spec.ts \
            tests/mentions.spec.ts \
            tests/interview.spec.ts
      - name: Stop wuphf (shell phase)
        if: always()
        run: |
          if [ -f wuphf.pid ]; then
            kill "$(cat wuphf.pid)" 2>/dev/null || true
          fi
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # ratchet:actions/upload-artifact@v7
        with:
          name: playwright-report
          path: web/e2e/playwright-report
          retention-days: 7
      - name: Upload wuphf logs on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # ratchet:actions/upload-artifact@v7
        with:
          name: wuphf-e2e-logs
          path: |
            wuphf.log
            wuphf-wizard.log
          retention-days: 7
          if-no-files-found: ignore

  release-build:
    runs-on: ubuntu-latest
    needs: web
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # ratchet:actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # ratchet:actions/download-artifact@v8
        with:
          name: web-dist
          path: web/dist
      - uses: goreleaser/goreleaser-action@e24998b8b67b290c2fa8b7c14fcfa7de2c5c9b8c # ratchet:goreleaser/goreleaser-action@v7
        with:
          version: latest
          args: release --snapshot --clean --skip=publish
      - name: Verify Windows artifacts shipped
        # Belt-and-braces against a future .goreleaser.yml edit that drops
        # `windows` from goos: or removes the format_overrides .zip block.
        # goreleaser would silently produce only Unix tarballs and CI would
        # still pass the install.sh smoke (which targets linux/amd64).
        run: |
          set -euo pipefail
          for arch in amd64 arm64; do
            zip=$(ls dist/wuphf_*_windows_${arch}.zip 2>/dev/null || true)
            if [ -z "$zip" ]; then
              echo "missing windows/${arch} .zip artifact in dist/" >&2
              echo "did .goreleaser.yml lose 'windows' from goos: or drop the format_overrides .zip block?" >&2
              exit 1
            fi
          done
          # Confirm both archives actually contain wuphf.exe (catches a
          # goreleaser binary `name` regression that would ship `wuphf`
          # without the .exe suffix on Windows). Both arches are checked
          # because a per-arch override could regress one without the other.
          for arch in amd64 arm64; do
            zip=$(ls dist/wuphf_*_windows_${arch}.zip | head -1)
            unzip -l "$zip" | grep -q 'wuphf\.exe' || {
              echo "windows/${arch} zip does not contain wuphf.exe — goreleaser binary name regressed?" >&2
              unzip -l "$zip" >&2
              exit 1
            }
          done
      - name: Smoke-test install.sh against snapshot (URL override)
        # Cheap sanity path: feed install.sh a file:// tarball directly so
        # download/extract/chmod/--version all run against the fresh snapshot.
        # This SKIPS the redirect-parsing resolver — see next step for that.
        run: |
          set -euo pipefail
          tarball="$(ls dist/wuphf_*_linux_amd64.tar.gz | head -1)"
          if [ -z "$tarball" ]; then
            echo "no snapshot tarball found in dist/" >&2
            exit 1
          fi
          # install.sh falls back to $HOME/.local/bin if /usr/local/bin isn't
          # writable — ensure either location is on PATH.
          export PATH="$HOME/.local/bin:/usr/local/bin:$PATH"
          WUPHF_INSTALL_URL_OVERRIDE="file://$PWD/$tarball" bash scripts/install.sh
          command -v wuphf
          wuphf --version
      - name: Smoke-test install.sh against real resolver (mock GitHub)
        # Guards the v0.8.1 regression: the 404 shipped to users lived in the
        # redirect-parsing + archive-URL construction (install.sh:39-48). The
        # URL-override step above bypasses that code entirely, so we also
        # stand up a local HTTP server that emulates GitHub's behavior:
        #   GET /releases/latest -> 302 /releases/tag/<tag>
        #   GET /releases/download/<tag>/<archive> -> the snapshot tarball
        # and point install.sh at it via WUPHF_INSTALL_REPO_BASE_URL.
        run: |
          set -euo pipefail
          tarball="$(ls dist/wuphf_*_linux_amd64.tar.gz | head -1)"
          archive="$(basename "$tarball")"
          version="${archive#wuphf_}"
          version="${version%_linux_amd64.tar.gz}"
          tag="v${version}"

          serve="$PWD/ci-mock-releases"
          rm -rf "$serve"
          mkdir -p "$serve/releases/download/${tag}"
          cp "$tarball" "$serve/releases/download/${tag}/${archive}"

          # The resolver parses VERSION from curl's url_effective by taking
          # the last '/'-delimited field. Real GitHub redirects to
          # /releases/tag/<tag> (no trailing slash). Python's default directory
          # handler would 301 to '/releases/tag/<tag>/' and strip VERSION to
          # empty — so handle the tag endpoint explicitly.
          python3 - "$tag" "$serve" <<'PY' &
          import http.server, socketserver, sys, os
          tag, root = sys.argv[1], sys.argv[2]
          os.chdir(root)
          tag_path = f"/releases/tag/{tag}"
          class H(http.server.SimpleHTTPRequestHandler):
              def do_GET(self):
                  if self.path == "/releases/latest":
                      self.send_response(302)
                      self.send_header("Location", tag_path)
                      self.end_headers()
                      return
                  if self.path == tag_path:
                      self.send_response(200)
                      self.send_header("Content-Type", "text/html")
                      self.end_headers()
                      self.wfile.write(b"<html></html>")
                      return
                  super().do_GET()
              def log_message(self, *a, **k):
                  pass
          with socketserver.TCPServer(("127.0.0.1", 7457), H) as srv:
              srv.serve_forever()
          PY
          server_pid=$!
          trap 'kill "$server_pid" 2>/dev/null || true' EXIT

          for _ in $(seq 1 10); do
            if curl -sf "http://127.0.0.1:7457/releases/tag/${tag}/" -o /dev/null; then
              break
            fi
            sleep 1
          done

          # Wipe the binary the prior step installed so we're actually
          # re-exercising install.sh end-to-end.
          rm -f "$HOME/.local/bin/wuphf"
          sudo rm -f /usr/local/bin/wuphf || true
          export PATH="$HOME/.local/bin:/usr/local/bin:$PATH"
          WUPHF_INSTALL_REPO_BASE_URL="http://127.0.0.1:7457" bash scripts/install.sh
          command -v wuphf
          wuphf --version

  # Pure-function tests for the npm wrapper's `process.platform === "win32"`
  # branches (archiveExtension, binaryFilename, archiveName, etc). These
  # branches are only exercised in the wild on actual Windows machines, so
  # without a unit test a refactor that drops `.zip`/`.exe` handling regresses
  # silently. Runs in <2s; no real network or filesystem.
  npm-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # ratchet:oven-sh/setup-bun@v2.2.0
        with:
          bun-version: "1.1.38"
      - name: Run npm wrapper tests
        working-directory: npm
        run: bun test

  # Real Windows runner smoke. Catches behavioral regressions that compile
  # cleanly but exit silently on first launch — the class of bug the
  # isPiped() fall-through fix (commit 9efaa3b3) addresses. windows-latest
  # bills at 2x Linux minutes; ~3 min wall clock = ~$0.008/PR. Worth it
  # because the regression vectors here are invisible to Linux/Mac CI.
  windows-smoke:
    needs: web
    runs-on: windows-latest
    steps:
      - name: Disable git's NTFS path protection
        # The .windsurf/workflows/ directory contains files with colons in
        # their names (nex:ask.md, etc — Windsurf's slash-command namespace
        # separator). On NTFS, the colon is reserved, so by default git's
        # core.protectNTFS=true rejects the checkout with "invalid path"
        # before any job step can run. Sparse-checkout doesn't help: git
        # validates paths from the fetched tree regardless of which paths
        # would actually be materialized. Disabling protectNTFS lets git
        # write the rest of the worktree; the colon files themselves end
        # up as untracked — fine, we don't need them to build wuphf.exe.
        # Tracked separately in CONTRIBUTING / repo hygiene if we want to
        # rename the source files later.
        run: git config --global core.protectNTFS false
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # ratchet:actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # ratchet:actions/download-artifact@v8
        with:
          name: web-dist
          path: web/dist
      - name: Build wuphf.exe
        env:
          CGO_ENABLED: "0"
        run: go build -o wuphf.exe ./cmd/wuphf
      - name: Help/version smoke
        shell: pwsh
        run: |
          ./wuphf.exe --version
          ./wuphf.exe --help | Out-Null
          ./wuphf.exe --help-all | Out-Null
      - name: Empty-pipe-stdin must reach the web UI (regression guard for 9efaa3b3)
        shell: pwsh
        # Reproduces the SSH/Start-Process/scheduled-task case where stdin is
        # a closed pipe with no data. Before the fix, isPiped() returned true,
        # the dispatch loop drained zero lines, and wuphf exited silently with
        # no output and no listener. We assert that the web UI binds within
        # 30s — if it doesn't, the regression is back.
        run: |
          $port = 17891
          # Use a fresh port so we don't collide with anything on the runner.
          $logPath = "$env:RUNNER_TEMP\wuphf-smoke.log"
          $proc = Start-Process -FilePath ./wuphf.exe `
            -ArgumentList "--no-open","--no-nex","--web-port",$port,"--broker-port","17890" `
            -RedirectStandardOutput $logPath `
            -RedirectStandardError "$env:RUNNER_TEMP\wuphf-smoke.err" `
            -PassThru -NoNewWindow
          try {
            $ok = $false
            for ($i = 0; $i -lt 30; $i++) {
              Start-Sleep -Seconds 1
              try {
                $r = Invoke-WebRequest -UseBasicParsing "http://127.0.0.1:$port/onboarding/state" -TimeoutSec 2
                if ($r.StatusCode -eq 200) { $ok = $true; break }
              } catch {}
            }
            if (-not $ok) {
              Write-Host "wuphf.exe never bound :$port — isPiped() regression?"
              if (Test-Path $logPath) { Write-Host "--- stdout ---"; Get-Content $logPath }
              if (Test-Path "$env:RUNNER_TEMP\wuphf-smoke.err") { Write-Host "--- stderr ---"; Get-Content "$env:RUNNER_TEMP\wuphf-smoke.err" }
              exit 1
            }
            Write-Host "OK: wuphf.exe bound :$port within $i seconds"
          } finally {
            Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
          }
      - name: Token file lives under TEMP (regression guard for brokeraddr Windows path)
        shell: pwsh
        # If anyone reverts internal/brokeraddr/addr.go to a const "/tmp/..."
        # this smoke catches it: the broker writes its token file on first
        # boot, and that file MUST be under %TEMP%, not under a literal
        # C:\tmp\ path that Windows would silently create at the drive root.
        run: |
          # Boot wuphf briefly so it writes the token file.
          $port = 17892
          $proc = Start-Process -FilePath ./wuphf.exe `
            -ArgumentList "--no-open","--no-nex","--web-port",$port,"--broker-port","17893" `
            -PassThru -NoNewWindow `
            -RedirectStandardOutput "$env:RUNNER_TEMP\wuphf-tok.log" `
            -RedirectStandardError "$env:RUNNER_TEMP\wuphf-tok.err"
          try {
            for ($i = 0; $i -lt 30; $i++) {
              Start-Sleep -Seconds 1
              try {
                Invoke-WebRequest -UseBasicParsing "http://127.0.0.1:$port/onboarding/state" -TimeoutSec 2 | Out-Null
                break
              } catch {}
            }
            $tempToken = Join-Path $env:TEMP "wuphf-broker-token-17893"
            $tmpToken  = "C:\tmp\wuphf-broker-token-17893"
            if (Test-Path $tmpToken) {
              Write-Error "regression: token file written to C:\tmp\ on Windows — internal/brokeraddr/addr.go reverted to a /tmp hardcode?"
              exit 1
            }
            # Retry briefly: the broker writes its token file shortly after
            # ServeWebUI returns, so a tight loop is enough. If it never lands
            # under %TEMP% the regression guard must hard-fail — passing on
            # absence would let a /tmp regression sneak through.
            $found = $false
            for ($j = 0; $j -lt 10; $j++) {
              if (Test-Path $tempToken) { $found = $true; break }
              Start-Sleep -Seconds 1
            }
            if (-not $found) {
              Write-Error "token file missing at expected TEMP path: $tempToken — internal/brokeraddr/addr.go regression?"
              exit 1
            }
            Write-Host "OK: token file at $tempToken"
          } finally {
            Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
          }
