name: Auto Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  # Needed to dispatch the Release workflow after pushing the tag. Without
  # this, gh workflow run returns HTTP 403.
  actions: write

jobs:
  release:
    runs-on: ubuntu-latest
    # Skip if the commit was made by this workflow (prevent loops).
    # The if: expression is evaluated by GitHub, not a shell — no injection risk.
    if: "!contains(github.event.head_commit.message, '[skip-release]')"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest tag
        id: latest
        run: |
          TAG=$(git tag --sort=-v:refname | grep '^v' | head -1)
          echo "tag=${TAG:-v0.0.0}" >> "$GITHUB_OUTPUT"

      - name: Bump version
        id: bump
        run: |
          CURRENT="${{ steps.latest.outputs.tag }}"
          CURRENT="${CURRENT#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          # Check all commits since last tag for bump signals
          COMMITS=$(git log "${{ steps.latest.outputs.tag }}..HEAD" --pretty=format:"%s" 2>/dev/null || git log --pretty=format:"%s")

          if echo "$COMMITS" | grep -qiE '^feat(\(|:)'; then
            MINOR=$((MINOR + 1))
            PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          NEW="v${MAJOR}.${MINOR}.${PATCH}"
          echo "version=$NEW" >> "$GITHUB_OUTPUT"
          echo "Bumping ${{ steps.latest.outputs.tag }} -> $NEW"

      - name: Create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.bump.outputs.version }}" -m "Release ${{ steps.bump.outputs.version }}"
          git push origin "${{ steps.bump.outputs.version }}"

      - name: Dispatch Release workflow at the new tag
        # Tag pushes made with GITHUB_TOKEN do not fire other workflows, so
        # the Release workflow's `on: push: tags` trigger never activates for
        # auto-created tags. workflow_dispatch is the documented exception —
        # gh triggers it explicitly and passes --ref so Release runs at the
        # newly-created tag (goreleaser reads GITHUB_REF = refs/tags/<tag>).
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.bump.outputs.version }}
        run: |
          gh workflow run release.yml --ref "$VERSION"
