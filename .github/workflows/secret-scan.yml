name: Secret Scan

# Org-wide secretlint scan on PR-changed files (plus full scan on pushes to
# main). Source: https://github.com/nex-crm/.github/blob/main/.github/workflows/scan-secrets.yml
#
# This is a belt-and-suspenders addition: lefthook's `no-secrets` pre-commit
# hook (see lefthook.yml) already catches the common `api_key='...'` pattern
# at commit time, but it's a local grep and won't catch token shapes that
# don't match the regex. secretlint's preset-recommend covers AWS, GitHub,
# Slack, Google, npm, Stripe, and more.

on:
  pull_request:
  push:
    branches: [main]

jobs:
  scan:
    uses: nex-crm/.github/.github/workflows/scan-secrets.yml@v0.4.0
