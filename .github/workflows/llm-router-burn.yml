name: llm-router burn-down

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: llm-router-burn-${{ github.ref }}
  cancel-in-progress: true

jobs:
  burn:
    name: Section 10.4 burn-down
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # ratchet:oven-sh/setup-bun@v2.2.0
        with:
          bun-version: "1.3.13"
      - name: Install workspace deps
        run: bun install --frozen-lockfile
      - name: Nightly llm-router burn-down
        run: bun run --cwd packages/llm-router burn:nightly
