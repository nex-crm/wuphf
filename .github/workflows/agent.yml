name: agent

# Scoped to the pi-mono build-agent package: runs only when agent/** (or this
# workflow) changes. Fires on every PR regardless of base branch; read-only.
on:
  push:
    branches: [main]
    paths:
      - "agent/**"
      - ".github/workflows/agent.yml"
  pull_request:
    paths:
      - "agent/**"
      - ".github/workflows/agent.yml"

permissions:
  contents: read

concurrency:
  group: agent-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
        with:
          # Don't leave the workflow token in local git config: this job runs
          # dependency/test code, and read-only scope is no defense against a
          # compromised dep exfiltrating a persisted token (zizmor: artipacked).
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # ratchet:oven-sh/setup-bun@v2.2.0
        with:
          bun-version: "1.3.13"
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun test
