name: nightly validation

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nightly-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  thread-stress:
    name: Section 15.B thread stress profile
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # ratchet:oven-sh/setup-bun@v2.2.0
        with:
          bun-version: "1.3.13"
      - name: Install workspace deps
        run: bun install --frozen-lockfile
      - name: Nightly thread stress profile
        run: bun run --cwd packages/broker ci:thread-stress
