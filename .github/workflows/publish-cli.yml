name: Publish CLI to npm

on:
  push:
    branches: [main]
    paths:
      - "cli/**"
      - "claude-code-plugin/src/**"
      - "claude-code-plugin/commands/**"

concurrency:
  group: publish-cli
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: cli

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Sync plugin into CLI
        run: |
          rsync -a --delete ../claude-code-plugin/src/ src/plugin/
          rsync -a --delete ../claude-code-plugin/commands/ plugin-commands/

      - run: bun install --frozen-lockfile

      - run: bun run build

      - name: Run tests (excluding e2e and node:test mock files)
        run: >-
          bun test
          tests/lib tests/integration tests/commands
          tests/tui/components tests/tui/views tests/tui/generative tests/tui/hooks
          tests/tui/agent-colors.test.ts tests/tui/channel-colors.test.ts
          tests/tui/components.test.tsx tests/tui/keybindings.test.ts tests/tui/store.test.ts
          tests/agent tests/calendar tests/chat tests/orchestration

      - name: Bump patch version
        id: bump
        run: |
          PUBLISHED=$(npm view @wuphf/wuphf version 2>/dev/null || echo "0.0.0")
          LOCAL=$(bun -e "console.log(require('./package.json').version)")

          # Semver-aware comparison using node
          NEEDS_SYNC=$(node -e "
            const [lM,lm,lp] = '$LOCAL'.split('.').map(Number);
            const [pM,pm,pp] = '$PUBLISHED'.split('.').map(Number);
            const localNum = lM*1000000 + lm*1000 + lp;
            const pubNum = pM*1000000 + pm*1000 + pp;
            console.log(localNum <= pubNum ? 'true' : 'false');
          ")

          if [ "$NEEDS_SYNC" = "true" ]; then
            # Local is behind or equal to published — sync to published, then bump
            npm version "$PUBLISHED" --no-git-tag-version --allow-same-version
            npm version patch --no-git-tag-version
            NEW_VERSION=$(bun -e "console.log(require('./package.json').version)")
            echo "bumped=true" >> "$GITHUB_OUTPUT"
            echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
            echo "Bumped $LOCAL -> $NEW_VERSION (published was $PUBLISHED)"
          else
            echo "bumped=false" >> "$GITHUB_OUTPUT"
            echo "version=$LOCAL" >> "$GITHUB_OUTPUT"
            echo "Version $LOCAL already ahead of published $PUBLISHED, publishing as-is."
          fi

      - name: Rebuild with new version
        if: steps.bump.outputs.bumped == 'true'
        run: bun run build

      - name: Publish to npm
        run: |
          VERSION="${{ steps.bump.outputs.version }}"
          if [ -z "$VERSION" ]; then echo "ERROR: version output is empty"; exit 1; fi
          # Check if this version already exists on npm
          if npm view "@wuphf/wuphf@$VERSION" version 2>/dev/null; then
            echo "Version $VERSION already published, skipping."
          else
            npm publish --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Commit version bump
        if: steps.bump.outputs.bumped == 'true'
        run: |
          cd ..
          git pull --rebase
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cli/package.json cli/src/plugin/ cli/plugin-commands/
          git commit -m "chore(cli): bump to v${{ steps.bump.outputs.version }} [skip ci]"
          git push
