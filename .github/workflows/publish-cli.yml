name: Publish CLI to npm

on:
  push:
    branches: [main]
    paths:
      - "cli/**"
      - "claude-code-plugin/src/**"
      - "claude-code-plugin/commands/**"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: cli

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Sync plugin into CLI
        run: |
          rsync -a --delete ../claude-code-plugin/src/ src/plugin/
          rsync -a --delete ../claude-code-plugin/commands/ plugin-commands/

      - run: npm ci

      - run: npm run build

      - run: npm test

      - name: Bump patch version
        id: bump
        run: |
          PUBLISHED=$(npm view @nex-ai/nex version 2>/dev/null || echo "0.0.0")
          LOCAL=$(node -p "require('./package.json').version")
          if [ "$LOCAL" = "$PUBLISHED" ]; then
            npm version patch --no-git-tag-version
            NEW_VERSION=$(node -p "require('./package.json').version")
            echo "bumped=true" >> "$GITHUB_OUTPUT"
            echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
            echo "Bumped $LOCAL -> $NEW_VERSION"
          else
            echo "bumped=false" >> "$GITHUB_OUTPUT"
            echo "version=$LOCAL" >> "$GITHUB_OUTPUT"
            echo "Version $LOCAL already ahead of published $PUBLISHED, publishing as-is."
          fi

      - name: Rebuild with new version
        if: steps.bump.outputs.bumped == 'true'
        run: npm run build

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Commit version bump
        if: steps.bump.outputs.bumped == 'true'
        run: |
          cd ..
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cli/package.json cli/src/plugin/ cli/plugin-commands/
          git commit -m "chore(cli): bump to v${{ steps.bump.outputs.version }} [skip ci]"
          git push
