name: Release

on:
  push:
    tags:
      - "v*"
  # workflow_dispatch lets auto-release.yml trigger this workflow via
  # `gh workflow run release.yml --ref <tag>`. A push tag event created with
  # GITHUB_TOKEN does not fire other workflows, but workflow_dispatch does.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify releasable tree
        run: |
          missing=0
          for path in go.mod cmd/wuphf/main.go npm/package.json web/bun.lock; do
            if [ ! -e "$path" ]; then
              echo "::error::missing ${path}; refusing to build or publish this tag"
              missing=1
            fi
          done
          test "$missing" -eq 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      # Pin to full SHA: third-party action, runs with write access to
      # contents (release upload). Same SHA is reused across all web-facing
      # workflows — keep them in sync.
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.1.38"

      - name: Build React frontend
        working-directory: web
        run: |
          bun install --frozen-lockfile
          bun run build

      - run: go test ./...

      - uses: goreleaser/goreleaser-action@v7
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve version
        id: version
        run: |
          REF="${GITHUB_REF#refs/tags/}"
          echo "version=${REF#v}" >> "$GITHUB_OUTPUT"

  publish-npm:
    needs: release
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.release.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Set package version
        working-directory: npm
        run: npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Publish to npm
        working-directory: npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

  smoke-test-npx:
    needs: [release, publish-npm]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    env:
      VERSION: ${{ needs.release.outputs.version }}
    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Wait for npm registry propagation
        run: sleep 45

      - name: npx wuphf --version
        run: |
          # The binary's self-reported version must match the tag. Without
          # this check, a goreleaser misconfiguration (missing -X ldflag on
          # buildinfo.Version) silently ships the hardcoded fallback and no
          # amount of `npx wuphf@latest` gets users the real release.
          OUT=$(npx --yes "wuphf@$VERSION" --version)
          echo "$OUT"
          echo "$OUT" | grep -E -q " v${VERSION}(\s|$)" || {
            echo "::error::binary self-reported version did not match tag $VERSION"
            echo "output was: $OUT"
            exit 1
          }
