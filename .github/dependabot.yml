version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns: ["*"]
    commit-message:
      prefix: "ci"
      include: "scope"

  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 10
    groups:
      all-dependencies:
        patterns: ["*"]
    commit-message:
      prefix: "chore"
      include: "scope"

  # Root: dev-only tooling (secretlint, commitlint, @secretlint rule presets).
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 10
    groups:
      all-dependencies:
        patterns: ["*"]
    commit-message:
      prefix: "chore"
      include: "scope"

  # Web frontend (React/vite). Uses bun.lock locally; dependabot reads
  # package.json directly. Without this entry, biome / vitest / vite /
  # tailwind bumps land manually only.
  - package-ecosystem: "npm"
    directory: "/web"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 10
    groups:
      web-dependencies:
        patterns: ["*"]
    commit-message:
      prefix: "chore(web)"
      include: "scope"

  # Playwright e2e harness. Self-contained workspace under web/e2e/ so
  # @playwright/test bumps don't entangle the main web build.
  - package-ecosystem: "npm"
    directory: "/web/e2e"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    groups:
      e2e-dependencies:
        patterns: ["*"]
    commit-message:
      prefix: "chore(e2e)"
      include: "scope"

  # npm wrapper that ships `npx wuphf` to the npm registry. Bumps here
  # affect the public install surface — keep its own group so they get
  # individual review, not lumped with the dev-tooling root group.
  - package-ecosystem: "npm"
    directory: "/npm"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    groups:
      npm-wrapper-dependencies:
        patterns: ["*"]
    commit-message:
      prefix: "chore(npm)"
      include: "scope"
