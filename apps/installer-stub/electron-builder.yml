appId: ai.nex.wuphf.installer-stub
productName: WUPHF (installer stub)
copyright: Copyright © 2026 Nex Labs Inc.
artifactName: wuphf-installer-stub-${version}-${os}-${arch}.${ext}
compression: maximum
directories:
  output: dist
  buildResources: build
files:
  - src/**/*
  - package.json
  - node_modules/**/*
  - "!node_modules/.bin/**/*"
  - "!node_modules/.cache/**/*"
  - "!node_modules/**/{test,tests,__tests__,docs,doc,example,examples}/**/*"
  - "!node_modules/**/*.map"
  - "!node_modules/**/*.md"
  - "!node_modules/**/*.ts"
  - "!**/*.log"
publish: null
afterSign: build/notarize-mac.js
mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  notarize: true
dmg:
  sign: false
win:
  target:
    - target: nsis
      arch:
        - x64
  signtoolOptions:
    sign: build/sign-windows.js
    rfc3161TimeStampServer: http://timestamp.acs.microsoft.com
    signingHashAlgorithms:
      - sha256
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  differentialPackage: true
linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  category: Development
