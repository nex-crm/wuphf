version: 2

builds:
  - id: wuphf
    main: ./cmd/wuphf
    binary: wuphf
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    env:
      - CGO_ENABLED=0
    ldflags:
      # Inject the release version (and build timestamp) so `wuphf --version`
      # reports the actual release instead of the hardcoded 0.1.0 fallback in
      # internal/buildinfo. goreleaser exposes {{.Version}} without a leading v
      # and {{.Date}} as RFC3339 — both match what buildinfo.Current() returns
      # to users.
      - -s -w
      - -X github.com/nex-crm/wuphf/internal/buildinfo.Version={{.Version}}
      - -X github.com/nex-crm/wuphf/internal/buildinfo.BuildTimestamp={{.Date}}

archives:
  - formats: [tar.gz]
    # Windows users get .zip — tar.gz is unfamiliar there, and the npm
    # wrapper relies on the extension to pick the right unpack path.
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: "wuphf_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  use: git
  sort: asc
  abbrev: -1
  format: "{{ .Message }}"
  groups:
    - title: Breaking changes
      regexp: '^.*?(feat|fix|perf|refactor|docs|chore|test|build|ci|style|revert)(\([^)]+\))?!:.+$'
      order: 0
    - title: New features
      regexp: '^.*?feat(\([^)]+\))?(!)?:.+$'
      order: 1
    - title: Bug fixes
      regexp: '^.*?fix(\([^)]+\))?(!)?:.+$'
      order: 2
    - title: Performance
      regexp: '^.*?perf(\([^)]+\))?(!)?:.+$'
      order: 3
    - title: Refactoring
      regexp: '^.*?refactor(\([^)]+\))?(!)?:.+$'
      order: 4
    - title: Documentation
      regexp: '^.*?docs(\([^)]+\))?(!)?:.+$'
      order: 5
    - title: Build and CI
      regexp: '^.*?(build|ci)(\([^)]+\))?(!)?:.+$'
      order: 6
    - title: Maintenance
      regexp: '^.*?(chore|test|style)(\([^)]+\))?(!)?:.+$'
      order: 7
    - title: Reverts
      regexp: '^.*?revert(\([^)]+\))?(!)?:.+$'
      order: 8
    - title: Other changes
      order: 999
  filters:
    exclude:
      - "^Merge pull request"
      - "^Merge remote-tracking branch"

release:
  github:
    owner: nex-crm
    name: wuphf
