id: ai-startup
name: AI Startup
display_name: AI Startup
icon: "🚀"
kind: founding_team
category: product
outcome: "Stand up a founding team that builds and ships an AI product."
description: A founding team of agents that takes an AI startup from a wedge to a shipped product and a working go-to-market loop.
objective: Turn a product idea into a shipped MVP and a repeatable go-to-market loop, with the founding team running build and growth together.
estimated_setup_minutes: 7
first_tasks:
  - id: wedge-brief
    title: "Write the wedge brief"
    prompt: |
      Write a wedge brief for the AI product I will describe during the call. Capture: who the first user is, the painful job they are trying to do, why now, the single thing the MVP must do on day one, and what we will deliberately refuse to build until v2.
    expected_output: "A one-page wedge brief with the user, the job, the why-now, the day-one MVP, and the explicit cuts."
  - id: mvp-cut-list
    title: "Cut a 2-week MVP scope"
    prompt: |
      Cut a 2-week MVP scope for the product. List the three smallest features that prove the core loop, the data model they need, and the user-visible result. Then list two features explicitly cut to v2 and why.
    expected_output: "A scoped MVP list with three in-scope features and two cuts, each with a one-line rationale."
skills:
  - name: "Product discovery"
    purpose: "Find the wedge and the smallest loop that proves the product."
  - name: "Shipping"
    purpose: "Turn the scoped MVP into a real, running product slice."
  - name: "Go-to-market"
    purpose: "Run a focused GTM loop that turns first users into a repeatable funnel."
requirements:
  - kind: api-key
    name: "ANTHROPIC_API_KEY or OPENAI_API_KEY"
    required: true
    detail: "Powers the CEO, engineer, growth, designer, and reviewer agents."
  - kind: runtime
    name: "Claude Code or Codex CLI"
    required: true
    detail: "Runs the agent loops locally and edits the codebase."
example_artifacts:
  - kind: brief
    title: "Wedge brief"
  - kind: spec
    title: "MVP scope document"
  - kind: plan
    title: "Go-to-market launch plan"
default_reviewer: ceo
reviewer_paths:
  "team/product/**": eng
  "team/growth/**": growth
  "team/reviews/**": reviewer
employee_blueprints:
  - workflow-automation-builder

starter:
  lead_slug: ceo
  general_channel_description: "Command deck for the {{brand_name}} founding team."
  kickoff_prompt: "Stand up the {{brand_name}} founding team end to end. Find the wedge, ship the smallest MVP that proves the loop, run the first go-to-market motion, and keep outbound, spend, and account changes behind human approval."
  agents:
    - slug: ceo
      emoji: "⚙️"
      name: CEO
      role: Owns priorities, approvals, and escalation decisions
      permission_mode: plan
      checked: true
      type: lead
      built_in: true
    - slug: eng
      emoji: "🛠️"
      name: Founding Engineer
      role: Ships the product, schema, and integrations
      employee_blueprint: workflow-automation-builder
      permission_mode: auto
      checked: true
      type: specialist
      expertise:
        - Full-stack
        - APIs
        - Architecture
      personality: Ships fast and keeps the system simple until it has to be complex. Biases toward a running demo over a design doc.
    - slug: growth
      emoji: "📈"
      name: Growth
      role: Owns positioning, outbound, and the first adoption loop
      permission_mode: plan
      checked: true
      type: specialist
      expertise:
        - Positioning
        - Outbound
        - Adoption loops
      personality: Treats GTM as an operating system, not a wish. Will pin the messaging to one sentence and defend it.
    - slug: designer
      emoji: "🎨"
      name: Designer
      role: Owns the product surface, flows, and first-run experience
      permission_mode: plan
      checked: true
      type: specialist
      expertise:
        - Product design
        - Flows
        - Prototyping
      personality: Balances taste with usability. Cuts the third button so the first one gets used.
    - slug: reviewer
      emoji: "🔎"
      name: Reviewer
      role: Owns QA, evidence, and approval gates
      permission_mode: plan
      checked: true
      type: specialist
      expertise:
        - Release QA
        - Evidence review
        - Approval gates
      personality: Keeps the build durable and visible. No release ships without proof it works.
  channels:
    - slug: "{{command_slug}}"
      name: "{{command_slug}}"
      description: "Executive control room for the {{brand_name}} founding team."
      members: [eng, growth, reviewer]
    - slug: product
      name: product
      description: "Define the wedge, the MVP scope, and the product surface."
      members: [eng, designer]
    - slug: build
      name: build
      description: "Ship the product, schema, and integration assets."
      members: [eng, reviewer]
    - slug: growth
      name: growth
      description: "Shape positioning, outbound, and the first adoption loop."
      members: [growth, designer]
    - slug: review
      name: review
      description: "Track outcomes, evidence, and the next iteration loop."
      members: [reviewer, growth]
  tasks:
    - channel: product
      owner: eng
      title: "Choose the wedge and MVP shape"
      details: "Clarify the first user, the core loop, and the day-one scope."
    - channel: build
      owner: eng
      title: "Ship the MVP slice"
      details: "Build the smallest running version that proves the core loop."
    - channel: growth
      owner: growth
      title: "Design the first go-to-market loop"
      details: "Map positioning and the first outbound lane to early users."
    - channel: review
      owner: reviewer
      title: "Set the launch scorecard and review cadence"
      details: "Define success metrics, the review rhythm, and the feedback loop for the first iteration."

bootstrap_config:
  channel_name: "{{brand_name}}"
  channel_slug: "{{brand_slug}}"
  niche: "An AI startup founding team that ships a product and runs its first go-to-market loop."
  audience: "Founders and small teams building an AI product from zero"
  positioning: "A founding team that builds and sells together: a shipped wedge, not a deck."
  content_pillars:
    - "Product discovery"
    - "Shipping"
    - "Go-to-market"
  content_series:
    - "Build logs"
    - "Launch notes"
    - "User retros"
  monetization_hooks:
    - "early access"
    - "subscription"
    - "design partner"
    - "expansion"
  publishing_cadence: "Weekly build and launch review"
  lead_magnet:
    name: "MVP Wedge Spec"
    cta: "Open the wedge spec"
    path: "/wedge-spec"
  monetization_assets:
    - stage: "Day 0"
      name: "MVP Wedge Spec"
      slot: "command_room"
      cta: "Open the wedge spec"
    - stage: "Build"
      name: "Product Slice Demo"
      slot: "build_lane"
      cta: "Open the demo packet"
    - stage: "Launch"
      name: "Go-to-Market Kit"
      slot: "growth_lane"
      cta: "Open the GTM kit"
  kpi_tracking:
    - name: "Time to first running demo"
      target: "< 2 weeks"
      why: "Proves the team ships, not just plans."
    - name: "Design partners booked"
      target: "5+ in the first month"
      why: "Shows the wedge has real pull."
    - name: "Core-loop activation rate"
      target: "Trending up week over week"
      why: "Confirms the MVP proves the loop it was scoped around."
    - name: "First paid conversion"
      target: "Within 45 days"
      why: "Marks the point where the build reaches buyers, not only watchers."

automation:
  - id: control-plane
    kicker: Build now
    title: Control plane + workspace defaults
    copy: Load the founding-team pack, queue seed, build lanes, and approval boundaries from template data instead of rebuilding them in the browser.
    status: build_now
    footer: "Single source of truth: template + runtime state."
  - id: product-engine
    kicker: Build now
    title: Product discovery + scope packets
    copy: Turn product goals into reusable discovery packets with an explicit wedge, core loop, and approval gates.
    status: build_now
    footer: Product discovery seeds the first queue automatically.
  - id: build-engine
    kicker: Build now
    title: Build templates + demo packets
    copy: Generate build briefs, implementation packets, and demo notes from the selected product run.
    status: build_now
    footer: Template-derived goals and approvals shape the generator prompt.
  - id: approval-plane
    kicker: Build now
    title: Approval boundaries stay explicit
    copy: Every run carries its own human approval list so outbound sends, spend, and account changes are blocked until approved.
    status: build_now
    footer: Approval policy is data-driven from the template.
  - id: review-loop
    kicker: Build now
    title: Metrics and review loop
    copy: Track build throughput, activation, and adoption so the startup improves each iteration.
    status: build_now
    footer: A weekly review loop is seeded by default.

monetization_ladder:
  - kicker: "Step 1"
    title: "early access"
    copy: "Turn early access into a reusable commercial lane in the operating system."
    footer: "Loaded from the startup ladder."
  - kicker: "Step 2"
    title: "design partner"
    copy: "Turn the design-partner program into a reusable commercial lane in the operating system."
    footer: "Loaded from the startup ladder."
  - kicker: "Step 3"
    title: "subscription"
    copy: "Turn the subscription into a reusable commercial lane in the operating system."
    footer: "Loaded from the startup ladder."
  - kicker: "Step 4"
    title: "expansion"
    copy: "Turn expansion into a reusable commercial lane in the operating system."
    footer: "Loaded from the startup ladder."

queue_seed:
  - id: wedge-selection
    title: "Choose the wedge and MVP shape"
    format: "Operational work item"
    stage_index: 0
    score: 95
    unit_cost: 8
    eta: "Iteration 1"
    monetization: "early access"
    state: "active"
  - id: mvp-build
    title: "Ship the MVP slice"
    format: "Operational work item"
    stage_index: 1
    score: 92
    unit_cost: 12
    eta: "Iteration 2"
    monetization: "design partner"
    state: "active"
  - id: gtm-loop
    title: "Design the first go-to-market loop"
    format: "Operational work item"
    stage_index: 2
    score: 86
    unit_cost: 10
    eta: "Iteration 3"
    monetization: "subscription"
    state: "active"
  - id: launch-scorecard
    title: "Set the launch scorecard and review cadence"
    format: "Operational work item"
    stage_index: 3
    score: 82
    unit_cost: 10
    eta: "Iteration 4"
    monetization: "expansion"
    state: "active"

stages:
  - id: discover
    name: Discover
    engine: planning
    description: "Find the wedge, the first user, and the core loop."
    exit_criteria: "The product objective and first work items are durable."
  - id: design
    name: Design
    engine: planning
    description: "Turn the wedge into an MVP scope and a build plan."
    exit_criteria: "Starter tasks, channels, and the scope exist."
  - id: build
    name: Build
    engine: execution
    description: "Ship the smallest running version that proves the loop."
    exit_criteria: "The first execution bundle is reviewable."
  - id: validate
    name: Validate
    engine: review
    description: "Demo the slice, smoke-test the loop, and capture evidence."
    exit_criteria: "Evidence is persisted and approvals are explicit."
  - id: launch
    name: Launch
    engine: operations
    description: "Run the build and growth loop with scorecards and approvals."
    exit_criteria: "The startup has a repeatable weekly rhythm."

artifacts:
  - id: wedge_brief
    name: Wedge brief
    description: "The first user, the painful job, the why-now, and the day-one MVP."
  - id: mvp_spec
    name: MVP spec
    description: "The scoped features, data model, and what is cut to v2."
  - id: execution_packet
    name: Execution packet
    description: "The current run's deliverables, checklist, and handoff context."
  - id: launch_report
    name: Launch report
    description: "Durable evidence for the first demo, pilot, or launch."

capabilities:
  - id: planning
    name: Planning and decomposition
    kind: planning
    description: "Turn the directive into workstreams, stages, and tasks."
  - id: delivery
    name: Execution and delivery
    kind: execution
    description: "Build the first deliverables and execution bundles."
  - id: integrations
    name: Integrations and handoffs
    kind: integration
    integrations: [github, gmail, slack, google-drive]
    description: "Use connected systems as execution surfaces for the build and launch."
  - id: approvals
    name: Operations and approvals
    kind: execution
    description: "Run the workflows, enforce approvals, and keep state durable."
  - id: analytics
    name: Metrics and review
    kind: analysis
    description: "Track activation, throughput, and loop improvements."

approval_rules:
  - id: external-accounts
    trigger: connect_account
    description: Human approval required before linking or authorizing a real external account.
  - id: public-send
    trigger: public_send_or_publish
    description: Human approval required before any public send, publish, or externally visible launch.
  - id: spend
    trigger: spend_money
    description: Human approval required before vendor spend, ad spend, or budget commitments.
  - id: commercial-commitment
    trigger: contract_or_legal_change
    description: Human approval required before legal or commercial commitments.

connections:
  - name: "GitHub build lane"
    integration: github
    owner: Engineering
    priority: critical
    purpose: "Use GitHub for product work, issues, and change tracking."
    smoke_test: "Create a dry-run issue and persist evidence."
    blocker: "Needs approved GitHub credentials before any live repository mutation."
  - name: "Gmail launch lane"
    integration: gmail
    owner: Growth
    priority: critical
    purpose: "Use Gmail for outreach, onboarding, and early-user communication."
    smoke_test: "Draft a dry-run launch note and persist evidence without sending."
    blocker: "Needs approved Gmail credentials before any live send."
  - name: "Slack delivery lane"
    integration: slack
    owner: Operations
    priority: important
    purpose: "Use Slack for team coordination and handoff updates."
    smoke_test: "Run a dry-run update and persist evidence."
    blocker: "Needs approved Slack credentials before any live message."
  - name: "Google Drive evidence lane"
    integration: google-drive
    owner: Knowledge
    priority: important
    purpose: "Use Drive for source assets, product docs, and evidence."
    smoke_test: "Write a mock artifact bundle and confirm persistence."
    blocker: "Needs approved Drive credentials before any live file mutation."

workflows:
  - id: product-intake-dry-run
    name: Product intake dry-run
    trigger: manual
    mode: dry_run
    integrations: [github, gmail]
    checklist:
      - Confirm product fields
      - Persist evidence
      - Capture approval gate
    description: Validate the product intake and handoff path without live side effects.
    definition:
      provider: one
      key: product-intake-dry-run
    smoke_test:
      name: Product intake dry-run
      mode: dry_run
      proof: Workflow evidence persisted without touching external systems.
      inputs:
        operation_name: AI Startup
  - id: build-review
    name: Build review
    trigger: manual
    mode: dry_run
    integrations: [google-drive, github]
    checklist:
      - Confirm source inputs
      - Produce the build packet
      - Persist audit evidence
    description: Validate the build-review path and produce the first demo-ready packet.
    definition:
      provider: one
      key: build-review
    smoke_test:
      name: Build review
      mode: dry_run
      proof: Build evidence persisted successfully.
      inputs:
        operation_name: AI Startup
  - id: launch-pilot
    name: Launch pilot
    trigger: manual
    mode: mock
    integrations: [gmail, slack]
    checklist:
      - Confirm launch scope
      - Run the mock launch
      - Persist launch evidence
    description: Validate the launch path for the first user cohort.
    definition:
      provider: one
      key: launch-pilot
    smoke_test:
      name: Launch pilot
      mode: mock
      proof: Launch evidence persisted successfully.
      inputs:
        operation_name: AI Startup
  - id: release-handoff
    name: Release handoff
    trigger: manual
    mode: mock
    integrations: [slack, google-drive]
    checklist:
      - Confirm handoff checklist
      - Confirm review gate
      - Persist release evidence
    description: Validate the final release handoff and evidence trail.
    definition:
      provider: one
      key: release-handoff
    smoke_test:
      name: Release handoff
      mode: mock
      proof: Release evidence persisted successfully.
      inputs:
        operation_name: AI Startup

wiki_schema:
  dirs:
    - team/product/
    - team/growth/
    - team/playbooks/
    - team/decisions/
    - team/inbox/
  bootstrap:
    - path: team/product/wedge.md
      title: "The wedge"
      skeleton: |
        # The wedge

        _(The one user, the one job, and the one thing the MVP must do on day one. If this page gets fuzzy, the build is drifting. Revisit it every time scope creeps.)_
    - path: team/product/roadmap-rationale.md
      title: "Roadmap rationale"
      skeleton: |
        # Roadmap rationale

        _(Not the public roadmap, the reasoning behind it. What we are choosing NOT to build yet and why. Revisit each iteration.)_
    - path: team/growth/positioning.md
      title: "Positioning and the first GTM loop"
      skeleton: |
        # Positioning

        _(The one sentence that says what we are and who it is for, plus the first outbound loop we run against it. Pin the sentence; defend it.)_
    - path: team/decisions/founding-log.md
      title: "Founding decisions log"
      skeleton: |
        # Founding decisions log

        _(One dated entry per non-trivial decision: what we decided, what we rejected, and what would make us revisit. Keep entries short; link to longer docs if needed.)_
    - path: team/inbox/raw-feedback.md
      title: "Raw user feedback"
      skeleton: |
        # Raw user feedback

        _(Unprocessed quotes from calls, demos, and support threads. Periodically the team reviews this page and promotes patterns up to product/ or growth/.)_
